name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-jose cryptography pytest
          
      - name: Run Minimal Verification Sample
        run: python samples/minimal_verification.py
        
      - name: Run Healthcare Federation Sample
        run: python samples/healthcare_federation.py
        
      - name: Run Financial KYC Sample
        run: python samples/financial_kyc.py
